<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Google API Scripts for Drive Integration -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <title>Sovereign - Financial Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/index.css?v=3.2">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-blur: 10px; }
        .loader {
            position: fixed; inset: 0; background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99999;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(16, 185, 129, 0.1);
            border-top: 3px solid #10b981; border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p {
            color: #10b981; font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.3em; margin: 0; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
    <!-- Sovereign Cloud SDKs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app" class="app-container">
        <div class="loader">
            <div class="spinner"></div>
            <p>Sovereign Protocol Active</p>
        </div>
    </div>
    <script>
        // Forzar modo oscuro si no hay preferencia guardada
        if (!localStorage.getItem('sovereign-theme')) {
            localStorage.setItem('sovereign-theme', 'dark');
        }
        // Inicializar iconos de Lucide periódicamente al inicio
        const initIcons = () => { if (window.lucide) window.lucide.createIcons(); };
        setTimeout(initIcons, 500);
        setTimeout(initIcons, 2000);

        // LIMPIEZA TOTAL DE SERVICE WORKERS Y CACHÉ
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
        if ('caches' in window) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
    <script src="src/app_v3.js?v=3.2"></script>
</body>
</html>
